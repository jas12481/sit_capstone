          \            v = x.get(\"intent_list\", [])\n            return v if isinstance(v,\
          \ list) else []\n        return []\n\n    intents = to_list(pending_intent_list)\n\
          \    if not intents:\n        obj = to_obj(pending_intents_json)\n        intents\
