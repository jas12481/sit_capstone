    # ── GLOBAL CLEANUP ────────────────────────────────────────────────────
    - data:
        code: "def main(text_in: str) -> dict:\n    import re\n\n    text = (text_in\
          \ or \"\").replace(\"\\r\\n\", \"\\n\")\n\n    NA_SET = {\"na\", \"n/a\",\
          \ \"not available\", \"not found\", \"none\", \"null\", \"-\", \"\"}\n\n  \
          \  def is_na(v: str) -> bool:\n        return v.strip().lower() in NA_SET\n\
          \n    def strip_md_noise(s: str) -> str:\n        s = s.strip()\n        s\
          \ = re.sub(r\"^\\s*[-*]\\s*\", \"\", s)\n        s = s.replace(\"**\", \"\
          \")\n        s = re.sub(r\"^`{3,}.*$\", \"\", s).strip()\n        return s\n\
          \n    def looks_like_table_row(s: str) -> bool:\n        s = strip_md_noise(s)\n\
          \        return s.count(\"|\") >= 2\n\n    def to_table_row(s: str) -> str:\n\
          \        s = strip_md_noise(s)\n        s = s.strip(\"|\")\n        return\
          \ f\"| {s} |\" if s else \"\"\n\n    def parse_row(s: str):\n        s = s.strip().strip(\"\
          |\")\n        return [c.strip() for c in s.split(\"|\")]\n\n    def is_separator_row(cells):\n\
          \        if not cells:\n            return False\n        return all(re.fullmatch(r\"\
          :?-{3,}:?\", c or \"\") for c in cells)\n\n    lines = [ln for ln in text.split(\"\
          \\n\")]\n    out = []\n    i = 0\n\n    while i < len(lines):\n        ln =\
          \ lines[i]\n\n        if looks_like_table_row(ln):\n            block = []\n\
          \            j = i\n            while j < len(lines) and looks_like_table_row(lines[j]):\n\
          \                row = to_table_row(lines[j])\n                if row:\n  \
          \                  block.append(row)\n                j += 1\n\n          \
          \  rows = [parse_row(r) for r in block if r.strip()]\n            rows = [r\
          \ for r in rows if r and not is_separator_row(r)]\n\n            if len(rows)\
          \ >= 2:\n                header = rows[0]\n                col_n = len(header)\n\
          \                fixed_rows = []\n                for r in rows[1:]:\n    \
          \                if len(r) < col_n:\n                        r = r + [\"\"\
          ] * (col_n - len(r))\n                    elif len(r) > col_n:\n          \
          \              r = r[:col_n-1] + [\" | \".join(r[col_n-1:])]\n            \
          \        r = [(\"\" if is_na(c) else c) for c in r]\n                    if\
          \ any(c.strip() for c in r):\n                        fixed_rows.append(r)\n\
          \                out.append(\"| \" + \" | \".join(header) + \" |\")\n      \
          \          out.append(\"| \" + \" | \".join([\"---\"] * col_n) + \" |\")\n\
          \                for r in fixed_rows:\n                    out.append(\"| \"\
          \ + \" | \".join(r) + \" |\")\n            else:\n                for r in\
          \ block:\n                    out.append(r)\n            i = j\n          \
          \  continue\n\n        s = strip_md_noise(ln)\n        m = re.match(r\"^([^\
          :\\n]{1,140})\\s*:\\s*(.+?)\\s*$\", s)\n        if m:\n            key = m.group(1).strip()\n\
          \            val = m.group(2).strip()\n            if is_na(val):\n        \
          \        i += 1\n                continue\n            out.append(f\"- **{key}:**\
          \ {val}\")\n        else:\n            if s:\n                out.append(s)\n\
          \        i += 1\n\n    final_text = \"\\n\".join(out)\n    final_text = re.sub(r\"\
          \\n{3,}\", \"\\n\\n\", final_text).strip()\n\n    return {\"cleaned_sections\"\
          : final_text}"
