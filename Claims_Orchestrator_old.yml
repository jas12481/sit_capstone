    # ── FOLLOWUP ROUTER ────────────────────────────────────────────────────
    - data:
        context:
          enabled: false
          variable_selector: []
        model:
          completion_params:
            temperature: 0.3
          mode: chat
          name: gpt-4o
          provider: langgenius/openai/openai
        prompt_config:
          jinja2_variables: []
        prompt_template:
        - id: followup-router-sys
          role: system
          text: "You are a routing classifier for an insurance claims assistant.\n\nGoal:\n\
            Classify the current user message into:\n- is_followup (boolean)\n- reuse_last_intents\
            \ (boolean)\n- needs_ids (boolean)\n\nDefinitions:\n1) is_followup = true\n\
            Set true when the user refers to the previous claims result, including:\n-\
            \ clarification: \"what does that mean\", \"explain this\", \"why\", \"how\
            \ to interpret\"\n- drill-down on returned data: \"tell me more about the\
            \ exclusion\", \"what is this rule\"\n- short context-dependent questions:\
            \ \"and the policy start date?\", \"what about the deductible?\"\n\nSet false\
            \ when:\n- user starts a new unrelated request\n- user gives a different/new\
            \ claim ID or policy ID\n- greeting/chitchat only\n\n2) reuse_last_intents\n\
            IMPORTANT:\n- clarification / explanation / interpretation follow-up: reuse_last_intents\
            \ = false\n- refresh / rerun / latest / check again / re-fetch: reuse_last_intents\
            \ = true\n- if is_followup = false: reuse_last_intents = false\n\n3) needs_ids\n\
            Set true only if a Claim ID or Policy ID is required and none is available\
            \ in context.\nOtherwise false.\n\nSpecial case:\n- If there is no prior assistant\
            \ message: is_followup = false, reuse_last_intents = false, needs_ids = false\n\
            \nOutput contract:\nReturn JSON only with boolean values:\n{\n  \"is_followup\"\
            : true|false,\n  \"reuse_last_intents\": true|false,\n  \"needs_ids\": true|false\n\
            }\nNo extra keys. No prose."
        - edition_type: basic
          id: followup-router-user
          role: user
          text: "Latest user message:\n{{#sys.query#}}\n\nConversation context:\n- Last\
            \ combined claims result: {{#conversation.last_combined_sections#}}\n- Stored\
            \ Claim ID: {{#conversation.claim_id#}}\n- Stored Policy ID: {{#conversation.policy_id#}}\n\
            - System awaiting Claim ID: {{#conversation.awaiting_claim_id#}}\n- System\
            \ awaiting Policy ID: {{#conversation.awaiting_policy_id#}}\n\nSpecial rule:\n\
            - If awaiting_claim_id = true and user message looks like a Claim ID (e.g.\
            \ CLM-0003, clm-005): is_followup = false, reuse_last_intents = false, needs_ids\
            \ = false\n- If awaiting_policy_id = true and user message looks like a Policy\
            \ ID (e.g. POL-HE-0002, pol-li-001): is_followup = false, reuse_last_intents\
            \ = false, needs_ids = false\n\nReturn routing classification using the required\
            \ structured schema only."
        selected: false
        structured_output:
          schema:
            additionalProperties: false
            properties:
              is_followup:
                type: boolean
              needs_ids:
                type: boolean
              reuse_last_intents:
                type: boolean
            required:
            - is_followup
            - reuse_last_intents
            - needs_ids
            type: object
        structured_output_enabled: true
        title: followup_router
        type: llm
        vision:
          enabled: false
