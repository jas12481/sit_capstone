            \ and cross-reference both a claim and its linked policy — compare claim against\
            \ policy coverage, check consistency. Requires Claim ID and/or Policy ID.\n\
            \n4. **assess_claim**: perform a full eligibility assessment of a claim against\
            \ its policy and mandatory rules — determine APPROVE / REJECT / REVIEW_NEEDED\
            \ / PENDING verdict. Requires a Claim ID (CLM-xxx).\n\nRules:\n- If query\
            \ covers ONE topic \u2192 route_type = \"single\", set primary_intent, intent_list\
            \ = [that one intent]\n- If query covers MULTIPLE topics \u2192 route_type\
            \ = \"multi\", primary_intent = first/dominant, intent_list = all identified\n\
            - If query is off-topic or unclear \u2192 route_type = \"unknown\", primary_intent\
            \ = \"unknown\", intent_list = []\n\nFor each item in intent_list, include:\n\
            - intent_name: one of [claim_details, policy_details, claim_and_policy_details,\
            \ assess_claim]\n- api_label: human-readable label e.g. \"claim details\"\
