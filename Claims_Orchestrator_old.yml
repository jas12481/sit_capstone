  features:
    file_upload:
      allowed_file_extensions: [.JPG, .JPEG, .PNG, .GIF, .WEBP, .SVG]
      allowed_file_types: [image]
      allowed_file_upload_methods: [local_file, remote_url]
      enabled: false
      fileUploadConfig:
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 50
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods: [local_file, remote_url]
      number_limits: 3
    opening_statement: 'Hello! I am your Claims Operations Assistant. You can ask me about:
      - **Claim details** (e.g. "Show me claim CLM-0003")
      - **Policy details** (e.g. "What are the details for POL-HE-0002?")
      - **Combined claim and policy** (e.g. "Cross-check CLM-0003 against POL-LI-0001")
      - **Claim assessment** (e.g. "Assess claim CLM-0005")

      Please provide a Claim ID (CLM-xxx) or Policy ID (POL-LI/HE/CI/DI-xxx) to get started.'
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
