    # ── UNPACK ITERATION RESULTS ──────────────────────────────────────────
    - data:
        code: "def main(iteration_results=None, claim_id=\"\", policy_id=\"\") -> dict:\n\
          \    import json\n\n    if not isinstance(iteration_results, list):\n      \
          \  iteration_results = []\n\n    sections = []\n    intents = []\n    outcomes\
          \ = []\n    topics = []\n\n    def add_unique(arr, val):\n        if val and\
          \ val not in arr:\n            arr.append(val)\n\n    def parse_obj(x):\n  \
          \      if isinstance(x, dict):\n            return x\n        if isinstance(x,\
          \ str):\n            s = x.strip()\n            if not s:\n               \
          \ return {}\n            try:\n                o = json.loads(s)\n        \
          \        return o if isinstance(o, dict) else {}\n            except Exception:\n\
          \                return {}\n        return {}\n\n    for item in iteration_results:\n\
          \        obj = parse_obj(item)\n\n        fr = str(obj.get(\"formatted_result\"\
          , \"\")).strip()\n        if fr and fr.lower() not in {\"no data returned.\"\
          , \"unknown_answer\"}:\n            sections.append(fr)\n\n        ctx_raw\
          \ = obj.get(\"suggestion_context\", \"\")\n        ctx = parse_obj(ctx_raw)\n\
          \n        if not isinstance(ctx, dict):\n            continue\n\n        intent\
          \ = str(ctx.get(\"intent\", \"\")).strip()\n        outcome = str(ctx.get(\"\
          outcome\", \"\")).strip()\n\n        add_unique(intents, intent)\n        add_unique(outcomes,\
          \ outcome)\n\n        st = ctx.get(\"suggestion_topics\", [])\n        if isinstance(st,\
          \ list):\n            for t in st:\n                add_unique(topics, str(t).strip())\n\
          \        elif isinstance(st, dict):\n            if outcome and isinstance(st.get(outcome),\
          \ list):\n                for t in st.get(outcome, []):\n                 \
          \   add_unique(topics, str(t).strip())\n            else:\n               \
          \ for _, v in st.items():\n                    if isinstance(v, list):\n  \
          \                      for t in v:\n                            add_unique(topics,\
          \ str(t).strip())\n\n    if sections:\n        merged_outcome = \"success\"\
          \n    else:\n        priority = [\"rejected\", \"review_needed\", \"error\"\
          , \"no_data\"]\n        merged_outcome = \"no_data\"\n        for p in priority:\n\
          \            if p in outcomes:\n                merged_outcome = p\n       \
