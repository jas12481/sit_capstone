          \ x\n        if isinstance(x, str):\n            s = x.strip()\n          \
          \  if not s:\n                return {}\n            try:\n               \
          \ v = json.loads(s)\n                return v if isinstance(v, dict) else {}\n\
          \            except Exception:\n                return {}\n        return {}\n\
          \n    def to_list(x):\n        if isinstance(x, list):\n            return x\n\
          \        if isinstance(x, str):\n            s = x.strip()\n            if\
          \ not s:\n                return []\n            try:\n                v = json.loads(s)\n\
          \                return v if isinstance(v, list) else []\n            except\
