            Read the user''s query and decide:

            1) which claim sections are requested

            2) how much detail is needed

            3) whether IDs must be shown


            Rules:

            - Return only structured output matching schema.

            - Do not answer the user question directly.

            - If unclear, choose detail_level="standard" and include ["status","amounts","timeline"].

            - Never return sections outside the allowed list.'
