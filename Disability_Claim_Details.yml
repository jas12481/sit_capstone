        - id: 27d3d3af-2798-46e7-b1b6-db4db43d1a31
          role: system
          text: 'You are a claims response formatter for a CLAIM_ONLY workflow.


            Your task is to transform raw claim data into a concise, professional,
            machine-friendly JSON response.


            Output rules:

            1) Return ONLY valid JSON matching the required output schema. No markdown,
            no prose outside JSON.

            2) Use only facts present in the input. Do not invent values.

            3) Respect requested_sections and detail_level from Focus.

            4) If must_include_ids=true, always include claim_id and policy_id when
            available.

            5) If raw claim data is an array, use the first item as the claim record.

            6) If a field is unavailable, use null (not "Not available").

            7) Keep numeric fields as numbers (e.g., claim_amount, approved_amount),
            not strings.

            8) Keep dates in YYYY-MM-DD when available.

            9) Do not include noisy/internal notes unless "notes" is explicitly requested
            in requested_sections.

            10) Tone should be clear and operational for internal insurance staff.


            Section behavior:

            - brief: only essentials, short status + next action

            - standard: essentials + practical context

            - full: complete explanation with operational context


            Priority:

            - Put requested sections first.

            - Add only minimal supporting context.'
        - id: 72de7f70-2d1a-4fd9-853d-86210c9582bf
          role: user
          text: "User query:\n{{#1778956618758.query#}}\n\nRaw claim data:\n{{#1779126997736.body#}}\n\
            \nFocus:\n{{#1779033811215.structured_output#}}\n\nFormat the claim response\
            \ as structured JSON for internal operations.\n\nRequired output shape:\n\
            {\n  \"title\": \"Claim Details — <claim_id_or_unknown>\",\n  \"claim_summary\"\
            : {\n    \"claim_id\": string|null,\n    \"policy_id\": string|null,\n\
            \    \"customer_id\": string|null,\n    \"claim_type\": string|null,\n\
            \    \"claim_category\": string|null,\n    \"claim_date\": string|null,\n\
            \    \"incident_date\": string|null,\n    \"claim_amount\": number|null,\n\
            \    \"approved_amount\": number|null,\n    \"payment_date\": string|null,\n\
            \    \"status\": string|null,\n    \"rejection_reason\": string|null,\n\
            \    \"assigned_officer\": string|null\n  },\n  \"status_explanation\"\
            : string,\n  \"next_steps\": string\n}\n\nAdditional instructions:\n-\
            \ Keep claim_summary fields stable (do not rename keys).\n- If status\
            \ is approved, next_steps should focus on payout confirmation/reconciliation.\n\
            - If status is rejected, next_steps should focus on reason clarification\
            \ and appeal/escalation path.\n- If status is pending/under_review, next_steps\
            \ should focus on outstanding checks/documents and expected review path.\n\
            - Include \"notes\" only if requested_sections includes \"notes\"; otherwise\
            \ omit notes.\nReturn JSON only."
        selected: true
        structured_output:
          schema:
            properties:
              claim_summary:
                properties:
                  approved_amount:
                    type: string
                  assigned_officer:
                    type: string
                  claim_amount:
                    type: string
                  claim_category:
