            \ in a disability-claim details workflow.\n\nTask:\nGenerate a compact `suggestion_context`\
            \ object from the user query and formatted claim response.\n\nRules:\n\
            1) Return ONLY valid JSON matching the schema.\n2) Do NOT generate explicit\
            \ follow-up questions.\n3) Use only facts present in the input.\n4) `path_type`\
            \ must be \"CLAIM_ONLY\".\n5) `outcome_type` should reflect claim status:\n\
            \   - approved -> APPROVED\n   - rejected -> REJECTED\n   - pending ->\
            \ PENDING\n   - under_review -> UNDER_REVIEW\n   - otherwise -> UNKNOWN\n\
            6) `follow_up_themes` must be short topic labels (not full questions).\n\
            7) `missing_information` should include only truly missing useful items.\n\
            8) `next_decision_points` should be concrete operational next checks/actions.\n\
            \nKeep output concise and practical."
        - id: eaef2d8b-d3ec-4087-9874-d3990e2c29d4
          role: user
          text: 'Build `suggestion_context` for this CLAIM_ONLY response.


            User query:

            {{#1778956618758.query#}}


            Formatted claim response:

            {{#1779133074056.structured_output#}}


            Instructions:

            - Fill `entities` from available claim fields.

            - Set `outcome_type` from claim status.

            - Provide 3-6 concise `follow_up_themes`.

            - Add only necessary `missing_information`.

            - Provide 2-5 actionable `next_decision_points`.


            Return JSON only.'
        selected: false
        structured_output:
          schema:
            additionalProperties: false
            properties:
