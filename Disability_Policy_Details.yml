            \ -> INACTIVE\n   - otherwise -> UNKNOWN\n6) `follow_up_themes` must be\
            \ short topic labels.\n7) `missing_information` should include only truly\
            \ missing useful items.\n8) `next_decision_points` should be concrete\
            \ operational next checks/actions.\n\nKeep output concise and practical."
        - id: afbdfb31-0dea-46de-9a1e-fe4b92a0a053
          role: user
