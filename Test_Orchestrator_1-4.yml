    - data:
        code: "def main(\n    api_label: str = \"\",\n    life_body: str = \"\",\n\
          \    health_body: str = \"\",\n    ci_body: str = \"\",\n    disability_body:\
          \ str = \"\"\n) -> dict:\n    import json\n    import re\n\n    label =\
          \ (api_label or \"Result\").strip()\n\n    raw = \"\"\n    for v in [\n\
          \        life_body,\n        health_body,\n        ci_body,\n        disability_body\n\
          \    ]:\n        if isinstance(v, str) and v.strip():\n            raw =\
          \ v.strip()\n            break\n\n    def parse_json_loose(text: str) ->\
          \ dict:\n        if not text:\n            return {}\n        try:\n   \
          \         obj = json.loads(text)\n            if isinstance(obj, dict):\n\
          \                return obj\n        except Exception:\n            pass\n\
          \        m = re.search(r\"\\{[\\s\\S]*\\}\", text)\n        if m:\n    \
          \        try:\n                obj = json.loads(m.group(0))\n          \
          \      if isinstance(obj, dict):\n                    return obj\n     \
          \       except Exception:\n                pass\n        return {}\n\n \
          \   parsed = parse_json_loose(raw)\n\n    if isinstance(parsed.get(\"tool_payload\"\
          ), str) and parsed.get(\"tool_payload\").strip():\n        inner = parse_json_loose(parsed[\"\
          tool_payload\"])\n        if isinstance(inner, dict) and inner:\n      \
          \      parsed = inner\n\n    # Support both 'formatted_result' and 'answer'\
          \ keys\n    formatted = str(parsed.get(\"formatted_result\", \"\")).strip()\n\
          \    if not formatted:\n        formatted = str(parsed.get(\"answer\", \"\
          \")).strip()\n    if not formatted:\n        formatted = raw if raw else\
          \ \"No data returned.\"\n\n    suggestion_context = parsed.get(\"suggestion_context\"\
          )\n    if isinstance(suggestion_context, dict):\n        suggestion_context\
          \ = json.dumps(suggestion_context, ensure_ascii=False)\n\n    if not isinstance(suggestion_context,\
          \ str) or not suggestion_context.strip():\n        fallback_ctx = {\n  \
          \          \"intent\": \"unknown\",\n            \"outcome\": \"success\"\
          \ if formatted != \"No data returned.\" else \"no_data\",\n            \"\
          entities\": {\"source\": label},\n            \"suggestion_topics\": [\"\
          check another claim\", \"explain this result\", \"next steps\"],\n     \
          \       \"constraints\": {\"language\": \"same_as_answer\", \"count\": 3,\
          \ \"max_chars_each\": 60}\n        }\n        suggestion_context = json.dumps(fallback_ctx,\
          \ ensure_ascii=False)\n\n    section_text = f\"**{label}**\\n{formatted}\"\
          \n\n    packed_result = json.dumps(\n        {\n            \"api_label\"\
          : label,\n            \"formatted_result\": section_text,\n            \"\
          suggestion_context\": suggestion_context\n        },\n        ensure_ascii=False\n\
          \    )\n\n    return {\n        \"formatted_result\": section_text,\n  \
          \      \"suggestion_context\": suggestion_context,\n        \"packed_result\"\
          : packed_result\n    }"
