          \  import json\n\n    def to_obj(x):\n        if isinstance(x, dict):\n\
          \            return x\n        if isinstance(x, str):\n            s = x.strip()\n\
          \            if not s:\n                return {}\n            try:\n  \
          \              v = json.loads(s)\n                return v if isinstance(v,\
          \ dict) else {}\n            except Exception:\n                return {}\n\
          \        return {}\n\n    def to_list(x):\n        if isinstance(x, list):\n\
          \            return x\n        if isinstance(x, str):\n            s = x.strip()\n\
          \            if not s:\n                return []\n            try:\n  \
          \              v = json.loads(s)\n                return v if isinstance(v,\
          \ list) else []\n            except Exception:\n                return []\n\
          \        if isinstance(x, dict):\n            v = x.get(\"intent_list\"\
          , [])\n            return v if isinstance(v, list) else []\n        return\
          \ []\n\n    intents = to_list(pending_intent_list)\n    if not intents:\n\
          \        obj = to_obj(pending_intents_json)\n        intents = to_list(obj)\n\
          \n    clean = []\n    for item in intents:\n        if isinstance(item,\
          \ dict):\n            intent_name = str(item.get(\"intent_name\", \"\")).strip()\n\
          \            api_label = str(item.get(\"api_label\", \"\")).strip()\n  \
          \          if intent_name:\n                clean.append({\n           \
          \         \"intent_name\": intent_name,\n                    \"api_label\"\
          : api_label\n                })\n\n    return {\"intent_list\": clean}"
