          \ list) else []\n    names = []\n    for x in intents:\n        if isinstance(x,\
          \ dict):\n            n = str(x.get(\"intent_name\", \"\")).strip()\n  \
          \          if n:\n                names.append(n)\n\n    if not names:\n\
          \        return {\"requires_claim_id\": True, \"requires_policy_id_only\"\
          : False}\n\n    requires_claim_id = any(n in REQUIRES_CLAIM_ID for n in\
          \ names)\n    requires_policy_id_only = (\n        not requires_claim_id\
          \ and\n        any(n in REQUIRES_POLICY_ID_ONLY for n in names)\n    )\n\
          \n    return {\n        \"requires_claim_id\": requires_claim_id,\n    \
          \    \"requires_policy_id_only\": requires_policy_id_only\n    }"
