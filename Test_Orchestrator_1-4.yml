    - data:
        code: "import re\n\ndef main(query: str) -> dict:\n    q = (query or \"\"\
          ).strip()\n    q_upper = q.upper()\n\n    # Claim ID: CLM- followed by 3-6\
          \ digits (e.g. CLM-003, CLM-0003, CLM-000012)\n    claim_match = re.search(\n\
          \        r'\\b(CLM-\\d{3,6})\\b', q_upper\n    )\n    claim_found = bool(claim_match)\n\
          \    claim_id = claim_match.group(1) if claim_match else \"\"\n\n    # Policy\
          \ ID: POL-(LI|HE|CI|DI)- followed by 3-6 digits (e.g. POL-HE-0002)\n   \
          \ pol_match = re.search(\n        r'\\b(POL-(LI|HE|CI|DI)-\\d{3,6})\\b',\
          \ q_upper\n    )\n    policy_found = bool(pol_match)\n    policy_id = pol_match.group(1)\
          \ if pol_match else \"\"\n\n    # Infer domain from policy ID prefix\n \
          \   intended_domain = \"\"\n    if pol_match:\n        prefix = pol_match.group(2)\n\
          \        intended_domain = {\n            \"LI\": \"life\",\n          \
          \  \"HE\": \"health\",\n            \"CI\": \"critical_illness\",\n    \
          \        \"DI\": \"disability\"\n        }.get(prefix, \"\")\n\n    return\
          \ {\n        \"claim_found\": claim_found,\n        \"claim_id\": claim_id,\n\
          \        \"policy_found\": policy_found,\n        \"policy_id\": policy_id,\n\
          \        \"intended_domain\": intended_domain\n    }"
