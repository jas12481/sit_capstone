        - id: ac3f4d5e-6f70-4182-9b3c-4d5e6f708293
          role: system
          text: 'You are a machine-context generator for downstream follow-up orchestration
            in a claims-history workflow.


            Task:

            Generate a compact `suggestion_context` object from the user query and
            formatted claims-history response.


            Rules:

            1) Return ONLY valid JSON matching the schema.

            2) Do NOT generate explicit follow-up questions.

            3) Use only facts present in the input.

            4) `path_type` must be "CLAIMS_HISTORY".

            5) `outcome_type` should be "HAS_CLAIMS" if total_claims > 0, otherwise
            "NO_CLAIMS".

            6) `follow_up_themes` must be short topic labels.

            7) `missing_information` should include only truly missing useful items.

            8) `next_decision_points` should be concrete operational next checks/actions.


            Keep output concise and practical.'
        - id: bd4f5e6f-7081-4293-ac4d-5e6f70829304
          role: user
          text: 'Build `suggestion_context` for this CLAIMS_HISTORY response.


            User query:

            {{#1790010001.query#}}


            Formatted claims-history response:

            {{#1790010004.structured_output#}}


            Instructions:

            - Fill `entities` from the formatted response.

            - Set `outcome_type` from total_claims.

            - Provide 3-6 concise `follow_up_themes`.

            - Add only necessary `missing_information`.

            - Provide 2-5 actionable `next_decision_points`.


            Return JSON only.'
        selected: false
        structured_output:
          schema:
            properties:
              entities:
                properties:
                  policy_id:
                    type: string
                  total_claims:
                    type: integer
                required:
                - policy_id
                - total_claims
                type: object
              follow_up_themes:
                items:
                  type: string
                type: array
              missing_information:
                items:
                  type: string
                type: array
              next_decision_points:
                items:
                  type: string
                type: array
              outcome_type:
                enum:
                - HAS_CLAIMS
                - NO_CLAIMS
                type: string
              path_type:
                enum:
                - CLAIMS_HISTORY
                type: string
            required:
            - path_type
            - outcome_type
            - entities
            - follow_up_themes
            - missing_information
            - next_decision_points
            type: object
        structured_output_enabled: true
        title: build_claims_history_suggestion_context
        type: llm
        vision:
          enabled: false
