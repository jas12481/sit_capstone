        prompt_template:
        - id: 8a1e2b3c-4d5e-4f60-9a1b-2c3d4e5f6071
          role: system
          text: 'You are a claims-history formatter for a CLAIMS_HISTORY workflow
            serving internal claims operations staff.


            Your task is to transform a raw list of claims under one policy into
            a concise, professional, machine-friendly JSON response.


            Output rules:

            1) Return ONLY valid JSON matching the required output schema.

            2) Use only facts present in the input. Do not invent claims, amounts,
            or dates.

            3) List every claim present in the raw data — do not omit or summarize
            away any claim.

            4) Keep numeric fields as numbers.

            5) Keep dates in YYYY-MM-DD when available.

            6) If a field is unavailable, use null.

            7) This is a listing operation only — do not assess eligibility or recommend
            a coverage decision for any claim.

            8) If the raw claims data is empty, return an empty claims array and
            total_claims=0 — this is a valid, expected result, not an error.'
        - id: 9b2f3c4d-5e6f-4071-8a2b-3c4d5e6f7182
          role: user
          text: "User query:\n{{#1790010001.query#}}\n\nRaw claims data (list) for\
            \ policy {{#1790010002.resolved_policy_id#}}:\n{{#1790010003.body#}}\n\
            \nFormat the claims history response as structured JSON for internal\
            \ operations.\n\nRequired output shape:\n{\n  \"title\": \"Claims History\
            \ — <policy_id_or_unknown>\",\n  \"policy_id\": string,\n  \"total_claims\"\
            : integer,\n  \"claims\": [\n    {\"claim_id\": string, \"claim_type\"\
            : string, \"claim_category\": string, \"status\": string, \"claim_amount\"\
            : number, \"approved_amount\": number|null, \"claim_date\": string}\n\
            \  ]\n}\n\nAdditional instructions:\n- Keep field names stable (do not\
            \ rename keys).\n- If raw claims data is not an array, treat it as a\
            \ single-item list.\n- Keep claim_amount and approved_amount as numbers\
            \ (not strings).\n- Use null only if a value is truly unavailable.\n\
            - Do not invent facts.\nReturn JSON only."
        selected: false
        structured_output:
          schema:
            properties:
              claims:
                items:
                  properties:
                    approved_amount:
                      type: number
                    claim_amount:
                      type: number
                    claim_category:
                      type: string
                    claim_date:
                      type: string
                    claim_id:
                      type: string
                    claim_type:
                      type: string
                    status:
                      type: string
                  type: object
                type: array
              policy_id:
                type: string
              title:
                description: Response title e.g. 'Claims History — POL-HE-0001'
                type: string
              total_claims:
                type: integer
            required:
            - title
            - policy_id
            - total_claims
            - claims
            type: object
        structured_output_enabled: true
        title: format_claims_history_response
        type: llm
        vision:
          enabled: false
