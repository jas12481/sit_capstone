    - data:
        code: "import re\n\ndef _clean(v):\n    return (v or \"\").strip()\n\ndef\
          \ _extract_policy_id_from_query(query):\n    q = _clean(query)\n    if not\
          \ q:\n        return \"\"\n    # Matches POL-HE-0001, POL-LI-0123, etc.\n\
          \    m = re.search(r\"\\b(POL-[A-Z]{2,4}-\\d{3,6})\\b\", q.upper())\n  \
          \  return m.group(1) if m else \"\"\n\ndef main(start_policy_id=\"\", query=\"\
          \"):\n    resolved = _clean(start_policy_id) or _extract_policy_id_from_query(query)\n\
          \    return {\"resolved_policy_id\": resolved}"
