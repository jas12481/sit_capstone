        prompt_template:
        - id: e3a4b5c6-7d8e-4f90-a1b2-3c4d5e6f7081
          role: system
          text: 'You are a machine-context generator for downstream follow-up orchestration
            in a customer-history workflow.


            Task:

            Generate a compact `suggestion_context` object from the user query
            and formatted customer-history response.


            Rules:

            1) Return ONLY valid JSON matching the schema.

            2) Do NOT generate explicit follow-up questions.

            3) Use only facts present in the input.

            4) `path_type` must be "CUSTOMER_HISTORY".

            5) `outcome_type` should be "HAS_ACTIVITY" if total_policies > 0 or
            total_claims > 0, otherwise "NO_ACTIVITY".

            6) `follow_up_themes` must be short topic labels.

            7) `missing_information` should include only truly missing useful items.

            8) `next_decision_points` should be concrete operational next checks/actions.


            Keep output concise and practical.'
        - id: f4b5c6d7-8e9f-4001-b2c3-4d5e6f708192
          role: user
          text: 'Build `suggestion_context` for this CUSTOMER_HISTORY response.


            User query:

            {{#1791010001.query#}}


            Formatted customer-history response:

            {{#1791010005.structured_output#}}


            Instructions:

            - Fill `entities` from the formatted response.

            - Set `outcome_type` from total_policies/total_claims.

            - Provide 3-6 concise `follow_up_themes`.

            - Add only necessary `missing_information`.

            - Provide 2-5 actionable `next_decision_points`.


            Return JSON only.'
        selected: false
        structured_output:
          schema:
            properties:
              entities:
                properties:
                  customer_id:
                    type: string
                  total_claims:
                    type: integer
                  total_policies:
                    type: integer
                required:
                - customer_id
                - total_policies
                - total_claims
                type: object
              follow_up_themes:
                items:
                  type: string
                type: array
              missing_information:
                items:
                  type: string
                type: array
              next_decision_points:
                items:
                  type: string
                type: array
              outcome_type:
                enum:
                - HAS_ACTIVITY
                - NO_ACTIVITY
                type: string
              path_type:
                enum:
                - CUSTOMER_HISTORY
                type: string
            required:
            - path_type
            - outcome_type
            - entities
            - follow_up_themes
            - missing_information
            - next_decision_points
            type: object
        structured_output_enabled: true
        title: build_customer_history_suggestion_context
        type: llm
        vision:
          enabled: false
