        prompt_template:
        - id: c1e2f3a4-5b6c-4d7e-8f90-1a2b3c4d5e6f
          role: system
          text: 'You are a customer-history formatter for a CUSTOMER_HISTORY workflow
            serving internal claims operations staff.


            Your task is to transform a customer''s raw policies list and raw claims
            list into one concise, professional, machine-friendly JSON response
            that cross-references claims to their policies.


            Output rules:

            1) Return ONLY valid JSON matching the required output schema.

            2) Use only facts present in the input. Do not invent policies, claims,
            amounts, or dates.

            3) List every policy and every claim present in the raw data — do not
            omit any.

            4) A customer''s policies may span multiple policy types (life, health,
            critical_illness, disability) — this is expected, not an error.

            5) Keep numeric fields as numbers.

            6) Keep dates in YYYY-MM-DD when available.

            7) If a field is unavailable, use null.

            8) This is a listing operation only — do not assess eligibility or recommend
            a coverage decision for any claim.

            9) If the raw policies or claims data is empty, return empty arrays
            and zero counts — this is a valid, expected result, not an error.'
        - id: d2f3a4b5-6c7d-4e8f-901a-2b3c4d5e6f70
          role: user
          text: "User query:\n{{#1791010001.query#}}\n\nRaw policies data for customer\
            \ {{#1791010002.resolved_customer_id#}}:\n{{#1791010003.body#}}\n\nRaw\
            \ claims data for the same customer:\n{{#1791010004.body#}}\n\nFormat\
            \ the customer history response as structured JSON for internal operations.\n\
            \nRequired output shape:\n{\n  \"title\": \"Customer History — <customer_id_or_unknown>\"\
            ,\n  \"customer_id\": string,\n  \"total_policies\": integer,\n  \"\
            total_claims\": integer,\n  \"policies\": [\n    {\"policy_id\": string,\
            \ \"policy_type\": string, \"status\": string, \"sum_assured\": number,\
            \ \"premium_amount\": number}\n  ],\n  \"claims\": [\n    {\"claim_id\"\
            : string, \"policy_id\": string, \"claim_type\": string, \"status\"\
            : string, \"claim_amount\": number, \"claim_date\": string}\n  ]\n}\n\
            \nAdditional instructions:\n- Keep field names stable (do not rename\
            \ keys).\n- If raw data is not an array, treat it as a single-item list.\n\
            - Keep sum_assured, premium_amount, and claim_amount as numbers (not\
            \ strings).\n- Use null only if a value is truly unavailable.\n- Do\
            \ not invent facts.\nReturn JSON only."
        selected: false
        structured_output:
          schema:
            properties:
              claims:
                items:
                  properties:
                    claim_amount:
                      type: number
                    claim_date:
                      type: string
                    claim_id:
                      type: string
                    claim_type:
                      type: string
                    policy_id:
                      type: string
                    status:
                      type: string
                  type: object
                type: array
              customer_id:
                type: string
              policies:
