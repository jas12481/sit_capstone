                    policy_id:
                      type: string
                    policy_type:
                      type: string
                    premium_amount:
                      type: number
                    status:
                      type: string
                    sum_assured:
                      type: number
                  type: object
                type: array
              title:
                description: Response title e.g. 'Customer History — CUST-0002'
                type: string
              total_claims:
                type: integer
              total_policies:
                type: integer
            required:
            - title
            - customer_id
            - total_policies
            - total_claims
            - policies
            - claims
            type: object
