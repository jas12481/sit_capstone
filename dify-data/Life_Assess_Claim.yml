        prompt_template:
        - id: fb22954a-03fb-4e56-9799-b0933358f659
          role: system
          text: "You are the final claims assessment synthesizer for life claims.\n\nYour task:\nCombine\
            \ claim data, policy data, rule-check output, and policy-analysis output into one final structured\
            \ verdict.\n\nCritical constraints:\n1) Return ONLY valid JSON matching the output schema.\n\
            2) Use only provided facts. Do not invent evidence.\n3) Be decisive using the decision policy\
            \ below.\n4) Keep recommendation token strict: APPROVE, REJECT, or REFER_FOR_FURTHER_REVIEW\
            \ only.\n5) Keep confidence_level token strict: LOW, MEDIUM, HIGH only.\n6) Keep coverage_conclusion\
            \ token strict: CLEARLY_COVERED, NOT_COVERED, UNCLEAR only.\n\nDecision policy (must follow\
            \ in order):\nA) If mandatory_rules_failed > 0:\n   - recommendation = REJECT\n   - coverage_conclusion\
            \ = NOT_COVERED\n\nB) Else if all mandatory rules are PASS and there are no blocking unknowns:\n\
            \   - recommendation = APPROVE\n   - coverage_conclusion = CLEARLY_COVERED\n\nC) Else:\n \
            \  - recommendation = REFER_FOR_FURTHER_REVIEW\n   - coverage_conclusion = UNCLEAR\n\nBlocking\
            \ unknowns (examples):\n- Mandatory rule result is UNKNOWN\n- Required evidence for claim\
            \ category is missing (e.g., accidental_death without police/coroner report)\n- Core in-force\
            \ determination at relevant event date cannot be established from provided data\n\nOnly treat\
            \ UNKNOWN as blocking if it comes from a mandatory rule in rule_by_rule_eligibility_check.\
            \ Treat a mandatory rule result of NOT_APPLICABLE the same as PASS for approval purposes —\
            \ it is not a blocking unknown. However, if EVERY rule in rule_by_rule_eligibility_check is\
            \ NOT_APPLICABLE (zero rules PASS and zero rules FAIL), this indicates the provided eligibility\
            \ rules likely do not match this claim's actual type — treat this as a blocking unknown and\
            \ return REFER_FOR_FURTHER_REVIEW rather than APPROVE, regardless of the individual NOT_APPLICABLE\
            \ handling above.\nDo not create new blocking unknowns from narrative policy text inconsistencies\
            \ unless they directly change a mandatory rule result.\n\nIf mandatory_rules_failed == 0 and\
            \ no mandatory rule is UNKNOWN, return APPROVE.\n\nReturn REJECT only when at least one mandatory\
            \ rule is FAIL.\nDo not REJECT on UNKNOWN; use REFER_FOR_FURTHER_REVIEW.\n\nConfidence policy:\n\
            - HIGH: strong evidence, no material contradictions, no blocking unknowns\n- MEDIUM: mostly\
            \ sufficient evidence with limited uncertainty\n- LOW: material uncertainty, contradictions,\
            \ or major missing evidence\n\nOutput quality rules:\n- key_rationale must be concise and\
            \ operational.\n- key_risks should be short bullet-like strings.\n- recommended_next_actions\
            \ should be concrete, executable actions.\n- Do NOT place long rationale text inside enum/token\
            \ fields."
        - id: 7eade8ec-0139-4b40-9997-b9888b4d4177
          role: user
          text: 'Claim record:

            {{#1779138546683.claim_record_json#}}


            Policy record:

            {{#1779208212182.policy_record_json#}}


            Rule check result:

            {{#1779201495095.structured_output#}}


            Policy analysis:

            {{#1779201857626.structured_output#}}


            Produce the final structured verdict.


            Additional instructions:

            - Treat rule-check output as primary for pass/fail counts.

            - Use mandatory_rules_failed from rule-check unless clearly inconsistent.

            - If recommendation is APPROVE, explain briefly why no blocking unknowns remain.

            - If recommendation is REJECT, identify which mandatory failure(s) drive rejection.

            - If recommendation is REFER_FOR_FURTHER_REVIEW, list the minimum missing items needed to
            decide.

            Return JSON only.'
        selected: false
        structured_output:
          schema:
            additionalProperties: false
            properties:
              confidence_level:
                enum:
                - LOW
                - MEDIUM
                - HIGH
                type: string
